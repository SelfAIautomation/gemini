steps:
  # Collector
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/cb-collector:$SHORT_SHA', './collector']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/cb-collector:$SHORT_SHA']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - cb-collector
      - --image=gcr.io/$PROJECT_ID/cb-collector:$SHORT_SHA
      - --region=asia-northeast1
      - --platform=managed
      - --no-allow-unauthenticated
      - --memory=512Mi
      - --timeout=300
      - --set-env-vars=SUPABASE_URL=$$SUPABASE_URL,SUPABASE_SERVICE_KEY=$$SUPABASE_SERVICE_KEY,GCP_PROJECT_ID=$PROJECT_ID

  # Processor
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/cb-processor:$SHORT_SHA', './processor']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/cb-processor:$SHORT_SHA']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - cb-processor
      - --image=gcr.io/$PROJECT_ID/cb-processor:$SHORT_SHA
      - --region=asia-northeast1
      - --platform=managed
      - --no-allow-unauthenticated
      - --memory=1Gi
      - --timeout=540
      - --set-env-vars=SUPABASE_URL=$$SUPABASE_URL,SUPABASE_SERVICE_KEY=$$SUPABASE_SERVICE_KEY,GEMINI_API_KEY=$$GEMINI_API_KEY

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/supabase-url/versions/latest
      env: SUPABASE_URL
    - versionName: projects/$PROJECT_ID/secrets/supabase-service-key/versions/latest
      env: SUPABASE_SERVICE_KEY
    - versionName: projects/$PROJECT_ID/secrets/gemini-api-key/versions/latest
      env: GEMINI_API_KEY
